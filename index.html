<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il mio sito</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  color: #94a3b8;
}

.btn {
  background: #22c55e;
  padding: 12px 20px;
  color: black;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
}

.services {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 50px;
  flex-wrap: wrap;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
}

footer {
  text-align: center;
  padding: 30px;
  color: gray;
}
</style>
</head>

<body>

<header>
  <div class="logo">TUO NOME</div>
</header>

<section class="hero">
  <h1>Creo siti web moderni</h1>
  <p>Web Developer | Design | SEO</p>
  <a href="#" class="btn">Contattami</a>
</section>

<section class="services">
  <div class="card">
    <h3>Web Design</h3>
    <p>Siti moderni e veloci</p>
  </div>
  <div class="card">
    <h3>Sviluppo</h3>
    <p>Codice pulito e performante</p>
  </div>
  <div class="card">
    <h3>SEO</h3>
    <p>Ottimizzazione Google</p>
  </div>
</section>

<footer>
  © 2026 - TUO NOME
</footer>

</body>
</html>
