<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>DIANA - DATABASE IDOLS IG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; font-size: 32px; color: #ff1f1f; margin: 40px 0; text-shadow: 0 0 20px #ff1f1f; }
        .group-section { margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .member { 
            padding: 10px; border: 2px solid; border-radius: 8px; text-align: center; font-weight: bold; font-size: 13px; 
            background: rgba(0,0,0,0.4); text-decoration: none; display: block; color: inherit; transition: 0.3s;
        }
        .member:hover { background: currentColor; color: #000; transform: scale(1.02); cursor: pointer; }
        .title-neon { font-family: 'Arial'; font-size: 18px; text-shadow: 0 0 10px currentColor; }
        .c1 { border-color: #ff007f; color: #ff007f; } .c2 { border-color: #8a2be2; color: #8a2be2; }
        .c3 { border-color: #ffd700; color: #ffd700; } .c4 { border-color: #00ff00; color: #00ff00; }
        .c5 { border-color: #1e90ff; color: #1e90ff; } .c6 { border-color: #ff0000; color: #ff0000; }
        .c7 { border-color: #ff8c00; color: #ff8c00; } .c8 { border-color: #00ced1; color: #00ced1; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="header">DIANA - DATABASE 100 IDOLS</h1>
    <div id="content"></div>

    <script>
        // Database con handle Instagram ufficiali verificati
        const groups = [

                {name:"ROSÉ", ig:"roses_are_rosie"}, {name:"LISA", ig:"lalalalisa_m"}
            ]},
            {n:"BTS", c:"c2", m:[
                {name:"RM", ig:"rkive"}, {name:"JIN", ig:"jin"}, {name:"SUGA", ig:"agustd"}, 
                {name:"J-HOPE", ig:"uarmyhope"}, {name:"JIMIN", ig:"j.m"}, {name:"V", ig:"thv"}, {name:"JUNGKOOK", ig:"jungkook.97"}
            ]},
            {n:"TWICE", c:"c1", m:[
                {name:"NAYEON", ig:"nayeonyny"}, {name:"JEONGYEON", ig:"jy_piece"}, {name:"MOMO", ig:"momo"}, 
                {name:"SANA", ig:"m.by__sana"}, {name:"JIHYO", ig:"_zyozyo"}, {name:"MINA", ig:"mina_sr_my"}, 
                {name:"DAHYUN", ig:"dahhyunnee"}, {name:"CHAEYOUNG", ig:"chaeyo.0"}, {name:"TZUYU", ig:"thinkaboutzu"}
            ]},
            {n:"AESPA", c:"c5", m:[
                {name:"KARINA", ig:"katarinabluu"}, {name:"GISELLE", ig:"aerichan"}, 
                {name:"WINTER", ig:"imwinter"}, {name:"NINGNING", ig:"imningningi"}
            ]},
            {n:"NEWJEANS", c:"c8", m:[
                {name:"MINJI", ig:"newjeans_official"}, {name:"HANNI", ig:"newjeans_official"}, 
                {name:"DANIELLE", ig:"newjeans_official"}, {name:"HAERIN", ig:"newjeans_official"}, {name:"HYEIN", ig:"newjeans_official"}
            ]}
        ];

        const container = document.getElementById('content');
        
        groups.forEach(g => {

                <h2 class="${g.c} title-neon" style="margin-bottom:10px;">${g.n}</h2>

            g.m.forEach(m => {
                html += `<a href="https://instagram.com/${m.ig}" target="_blank" class="member ${g.c}">${m.name}</a>`;

            html += `</div></div>`;
            container.innerHTML += html;

    </script>
</div>
</body>
</html>
