        .header { text-align: center; font-size: 32px; color: #ff1f1f; margin: 40px 0; text-shadow: 0 0 20px #ff1f1f; }

        @keyframes pulse { 0% { box-shadow: 0 0 5px currentColor; } 100% { box-shadow: 0 0 15px currentColor; } }
        
        /* Colori Neon */
