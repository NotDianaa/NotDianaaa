<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Not_Diana - K-Pop Database</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.9.3/tsparticles.bundle.min.js"></script>

<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Roboto',sans-serif; background:#000; color:#fff; overflow-x:hidden; }
    
    /* Layout Home */
    #main-app { display:block; }
    header { padding:40px; text-align:center; }
    .logo { font-family:'Press Start 2P'; color:#ff1f1f; font-size:32px; text-shadow:0 0 20px red; }
    
    .card-container { display:flex; justify-content:center; padding:50px; }
    .btn-kpop { background:#22c55e; padding:15px 30px; border-radius:10px; color:#000; font-weight:bold; cursor:pointer; text-decoration:none; }

    /* Pagina Nomi */
    #kpop-page { display:none; background:#000; min-height:100vh; padding:20px; }
    #back-btn { position:fixed; top:20px; left:20px; background:#ff1f1f; padding:10px; cursor:pointer; font-family:'Press Start 2P'; font-size:10px; z-index:100; }
    
    .group-wrap { margin-bottom: 80px; text-align:center; }
    .sticky-title { position:sticky; top:60px; font-family:'Press Start 2P'; font-size:30px; padding:20px; background:rgba(0,0,0,0.8); z-index:50; }
    .members-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:20px; padding:20px; }
    .member-name { font-family:'Roboto Mono'; font-weight:bold; font-size:18px; padding:10px; border:1px solid #333; border-radius:8px; }
</style>
</head>

<body>

<div id="main-app">
    <header><div class="logo">DIANA K-POP</div></header>
    <div class="card-container">
        <a class="btn-kpop" onclick="document.getElementById('main-app').style.display='none'; document.getElementById('kpop-page').style.display='block';">ACCEDI AL DATABASE IDOL</a>
    </div>
</div>

<div id="kpop-page">
