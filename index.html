<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana – Dark Dev & Gamer</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<!-- tsParticles per le particelle -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.9.3/tsparticles.bundle.min.js"></script>

<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }
body, html { width:100%; height:100%; font-family:'Roboto',sans-serif; overflow-x:hidden; }

/* VIDEO BACKGROUND */
#bg-video {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:-2;
  opacity:0.75;
}

/* PARTICLE BACKGROUND */
#tsparticles {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* HEADER */
header {
  padding:20px; 
  text-align:center;
  background:rgba(0,0,0,0.55);
}
.logo {
  font-family:'Press Start 2P',cursive;
  color:#ff1f1f;
  font-size:30px;
  text-shadow:0 0 15px #ff1f1f,0 0 30px #ff0000;
}

/* HERO */
.hero {
  padding:120px 20px;
  text-align:center;
}
.hero h1 {
  font-family:'Press Start 2P',cursive;
  font-size:55px;
  color:#ff1f1f;
  animation:neonPulse 3s ease-in-out infinite alternate;
}
.hero p {
  color:#ddd;
  margin-top:10px;
  font-size:20px;
}
@keyframes neonPulse {
  from { text-shadow:0 0 10px #ff1f1f; }
  to { text-shadow:0 0 35px #ff1f1f,0 0 70px #ff0000; }
}

/* PROJECT CARDS */
.projects {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
  padding:60px 20px;
}
.card {
  background:rgba(0,0,0,0.8);
  border-radius:18px;
  padding:28px;
  text-align:center;
  border:1px solid #330000;
  transition:transform 0.4s,box-shadow 0.4s;
}
.card:hover {
  transform:translateY(-7px) scale(1.02);
  box-shadow:0 0 35px #ff1f1f,0 0 70px #ff0000;
}
.card h3 {
  color:#ff1f1f;
  font-family:'Press Start 2P',cursive;
  margin-bottom:10px;
}
.card a {
  display:block;
  margin-top:12px;
  padding:12px 0;
  text-decoration:none;
  font-weight:bold;
  font-size:18px;
  border-radius:10px;
  transition:0.3s;
}

/* BUTTON CUSTOM STYLES */
.btn1 { background:#ff1f1f;color:#0a0a0a; }
.btn1:hover { background:#ff3c3c; }

.btn2 { background:#ff9300;color:#0a0a0a; }
.btn2:hover { background:#ffb44d; }

.btn3 { background:#8f1fff;color:#0a0a0a; }
.btn3:hover { background:#b16cff; }

/* FOOTER */
footer {
  text-align:center;
  padding:36px;
  color:#aaa;
  font-size:14px;
}
</style>
</head>

<body>

<!-- Background Video -->
<video id="bg-video" autoplay loop muted playsinline>
  <source src="background.mp4" type="video/mp4">
</video>

<div id="tsparticles"></div>

<header>
  <div class="logo">DIANA</div>
</header>

<section class="hero">
  <h1>Diana – Dark Dev</h1>
  <p>Gamer | Developer | Creator</p>
</section>

<section class="projects">
  <div class="card">
    <h3>PyAnimeCLI</h3>
    <p>Tool Python CLI animato</p>
    <a class="btn1" href="https://pypi.org/project/pyanimecli/" target="_blank">Vai a PyPI</a>
  </div>
  <div class="card">
    <h3>YumaAPI</h3>
    <p>API per progetti online</p>
    <a class="btn2" href="https://yumaapi.vercel.app/" target="_blank">Apri YumaAPI</a>
  </div>
  <div class="card">
    <h3>Discord</h3>
    <p>Contatta Diana</p>
    <a class="btn3" href="https://discord.com/users/not_diana__" target="_blank">Apri Discord</a>
  </div>
</section>

<footer>© 2026 Diana – Dark Dev & Gamer</footer>

<script>
tsParticles.load("tsparticles", {
  particles: {
    number: { value: 65, density: { enable: true, value_area: 900 } },
    color: { value: "#ff1f1f" },
    shape: { type: "circle" },
    opacity: { value: 0.7 },
    size: { value: 3 },
    move: { enable: true, speed: 1.4 }
  },
  interactivity: {
    events: {
      onhover: { enable: true, mode: "repulse" },
      onclick: { enable: true, mode: "push" }
    }
  }
});
</script>

</body>
</html>
