<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not_Diana</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.9.3/tsparticles.bundle.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Roboto',sans-serif; background:#000; color:#fff; overflow-x:hidden; }

#bg-video { position:fixed; width:100%; height:100%; object-fit:cover; z-index:-2; opacity:0.6; }
#tsparticles { position:fixed; width:100%; height:100%; z-index:-1; }

header { padding:20px; text-align:center; background:rgba(0,0,0,0.6); }
.logo { font-family:'Press Start 2P'; color:#ff1f1f; font-size:28px; text-shadow:0 0 15px red; }

.hero { padding:140px 20px; text-align:center; border-bottom:1px solid rgba(255,0,0,0.2); }
.hero h1 { font-family:'Press Start 2P'; font-size:42px; color:#ff1f1f; animation:glow 3s infinite alternate; }
.hero p { color:#ccc; margin-top:10px; }
@keyframes glow { from { text-shadow:0 0 10px red; } to { text-shadow:0 0 40px red; } }

.projects { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px; padding:60px 20px; }
.card { background:rgba(0,0,0,0.85); border-radius:18px; padding:20px; text-align:center; border:1px solid #330000; transition:0.4s; }
.card:hover { transform:translateY(-6px) scale(1.02); box-shadow:0 0 30px red; }
.card h3 { color:#ff1f1f; font-family:'Press Start 2P'; font-size:14px; }
.card p { color:#aaa; margin:10px 0; }
.card img { width:100%; height:160px; object-fit:cover; border-radius:10px; margin-bottom:10px; }
.card a { display:block; margin:6px 0; padding:10px; border-radius:8px; text-decoration:none; font-weight:bold; color:#000; cursor:pointer; }

.btn1 { background:#ff1f1f; }
.btn2 { background:#ff9300; }
.btn3 { background:#8f1fff; }
.btn4 { background:#22c55e; }
.btn5 { background:#06b6d4; }
.btn6 { background:#facc15; }

/* PAGINA KPOP */
#kpop-page { display:none; position:absolute; top:0; left:0; width:100%; background:#000; z-index:999; padding:50px; }
.back-btn { cursor:pointer; color:#ff1f1f; font-family:'Press Start 2P'; margin-bottom:20px; }
.group-title { font-family:'Press Start 2P'; color:#fff; margin:40px 0 20px; }

.terminal { background:#000; border:1px solid red; padding:20px; margin:60px auto; max-width:900px; font-family:'Roboto Mono'; color:#0f0; box-shadow:0 0 20px red; }
footer { text-align:center; padding:30px; color:#888; }
</style>
</head>

<body>

<div id="main-content">
    <video id="bg-video" autoplay loop muted>
      <source src="https://motionbgs.com/abstract-dna/video.mp4">
    </video>
    <div id="tsparticles"></div>

    <header>
      <div class="logo">DIANA</div>
    </header>

    <section class="hero">
      <h1>Diana – Dark Dev</h1>
      <p>Gamer | Developer | Creator</p>
    </section>

    <section class="projects">
      <div class="card">
        <img src="https://prominencerpg.com/wp-content/uploads/2024/10/Prominence-II-RPG-Hasturian-Era.webp">
        <h3>Prominence</h3>
        <p>Hasturian Era</p>
        <a class="btn1" href="https://rpg.prominence.wiki/hasturian-era" target="_blank">Wiki</a>
      </div>

      <div class="card">
        <h3>K-POP IDOLS</h3>
        <p>Visualizza lista</p>
        <a class="btn4" onclick="document.getElementById('main-content').style.display='none'; document.getElementById('kpop-page').style.display='block';">Apri</a>
      </div>

      <div class="card">
        <img src="https://img.freepik.com/premium-photo/discord-logo">
        <h3>Discord</h3>
        <p>Contattami</p>
        <a class="btn3" href="https://discord.com/users/not_diana__" target="_blank">Apri</a>
      </div>
    </section>

    <div class="terminal">
      <p>[Diana@dev]$ system.boot</p>
      <p>Loading modules...</p>
      <p>Success ✔</p>
    </div>

    <footer>© 2026 Diana</footer>
</div>

<div id="kpop-page">
    <div class="back-btn" onclick="document.getElementById('main-content').style.display='block'; document.getElementById('kpop-page').style.display='none';">← INDIETRO</div>
    <h1 style="color:#fff">Lista Idol</h1>
    <p style="color:#888">Qui puoi mettere i tuoi gruppi...</p>
</div>

<script>
tsParticles.load("tsparticles", {
  particles: {
    number: { value: 70 },
    color: { value: "#ff1f1f" },
    size: { value: 3 },
    move: { enable: true, speed: 1 }
  }
});
</script>
</body>
</html>
