<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not_Diana</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.9.3/tsparticles.bundle.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Roboto',sans-serif; background:#000; color:#fff; overflow-x:hidden; }

/* Overlay per la lista nomi */
#nomi-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  z-index: 999;
  text-align: center;
  padding-top: 100px;
}
#nomi-overlay h2 { color: #ff1f1f; margin-bottom: 20px; }
#nomi-overlay ul { list-style: none; color: #fff; font-size: 20px; }
#nomi-overlay li { margin: 10px; }
.close-btn { cursor: pointer; color: #ff1f1f; margin-top: 30px; display: block; font-weight: bold; }

/* Il resto del tuo CSS resta uguale */
#bg-video { position:fixed; width:100%; height:100%; object-fit:cover; z-index:-2; opacity:0.6; }
#tsparticles { position:fixed; width:100%; height:100%; z-index:-1; }
header { padding:20px; text-align:center; background:rgba(0,0,0,0.6); }
.logo { font-family:'Press Start 2P'; color:#ff1f1f; font-size:28px; text-shadow:0 0 15px red; }
.hero { padding:140px 20px; text-align:center; border-bottom:1px solid rgba(255,0,0,0.2); }
.hero h1 { font-family:'Press Start 2P'; font-size:42px; color:#ff1f1f; animation:glow 3s infinite alternate; }
@keyframes glow { from { text-shadow:0 0 10px red; } to { text-shadow:0 0 40px red; } }
.projects { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:24px; padding:60px 20px; }
.card { background:rgba(0,0,0,0.85); border-radius:18px; padding:20px; text-align:center; border:1px solid #330000; transition:0.4s; }
.card a { display:block; margin:6px 0; padding:10px; border-radius:8px; text-decoration:none; font-weight:bold; color:#000; cursor:pointer; }
.btn4 { background:#22c55e; }
</style>
</head>

<body>

<!-- POPUP NOMI -->
<div id="nomi-overlay">
  <h2>Lista Nomi</h2>
  <ul>
    <li>Diana</li>
    <li>Utente 1</li>
    <li>Utente 2</li>
  </ul>
  <span class="close-btn" onclick="document.getElementById('nomi-overlay').style.display='none'">CHIUDI</span>
</div>

<video id="bg-video" autoplay loop muted>
  <source src="https://motionbgs.com/abstract-dna/video.mp4">
</video>
<div id="tsparticles"></div>

<header><div class="logo">DIANA</div></header>

<section class="hero">
  <h1>Community</h1>
</section>

<section class="projects">
  <div class="card">
    <h3>Nomi</h3>
    <p>Visualizza lista</p>
    <!-- Il pulsante ora attiva il popup -->
    <a class="btn4" onclick="document.getElementById('nomi-overlay').style.display='block'">Visualizza</a>
  </div>
</section>

<!-- ... (il resto del tuo codice originale) ... -->

<script>
tsParticles.load("tsparticles", {
  particles: { number: { value: 70 }, color: { value: "#ff1f1f" }, size: { value: 3 }, move: { enable: true, speed: 1 } }
});
</script>

</body>
</html>
